# Spendif.ai — Model Registry
# Catalog of supported GGUF models with HW tier mapping.
# Used by model_manager.py to auto-select the best model for the user's hardware.
# Override via ~/.spendifai/models_registry.yaml (deep merge).

models:
  - id: qwen2.5-1.5b
    name: Qwen2.5-1.5B-Instruct
    params: "1.5B"
    quant: Q4_K_M
    filename: qwen2.5-1.5b-instruct-q4_k_m.gguf
    repo: Qwen/Qwen2.5-1.5B-Instruct-GGUF
    size_mb: 1120
    ram_min_gb: 4
    tier: minimal
    languages: [it, en, fr, de, es, pt, nl]

  - id: qwen2.5-3b
    name: Qwen2.5-3B-Instruct
    params: "3B"
    quant: Q4_K_M
    filename: qwen2.5-3b-instruct-q4_k_m.gguf
    repo: Qwen/Qwen2.5-3B-Instruct-GGUF
    size_mb: 2100
    ram_min_gb: 8
    tier: standard
    languages: [it, en, fr, de, es, pt, nl, pl, ro, sv, da]

  - id: llama-3.2-3b
    name: Llama-3.2-3B-Instruct
    params: "3B"
    quant: Q4_K_M
    filename: Llama-3.2-3B-Instruct-Q4_K_M.gguf
    repo: bartowski/Llama-3.2-3B-Instruct-GGUF
    size_mb: 1900
    ram_min_gb: 8
    tier: standard
    languages: [it, en, fr, de, es, pt, nl, pl]

  - id: qwen2.5-7b
    name: Qwen2.5-7B-Instruct
    params: "7B"
    quant: Q4_K_M
    filename: Qwen2.5-7B-Instruct-Q4_K_M.gguf
    repo: Qwen/Qwen2.5-7B-Instruct-GGUF
    size_mb: 4700
    ram_min_gb: 12
    tier: advanced
    languages: [it, en, fr, de, es, pt, nl, pl, ro, sv, da, fi, el, cs, hu]

  - id: gemma-3-12b
    name: Gemma-3-12B-it
    params: "12B"
    quant: Q4_K_M
    filename: gemma-3-12b-it-Q4_K_M.gguf
    repo: google/gemma-3-12b-it-GGUF
    size_mb: 6800
    ram_min_gb: 16
    tier: premium
    languages: [it, en, fr, de, es, pt, nl, pl, ro, sv, da, fi, el, cs, hu]

# Map available RAM (GB) to recommended model ID.
# The loader picks the entry whose key is <= detected RAM.
# Keys must be sorted ascending.
default_tier_map:
  4: qwen2.5-1.5b
  8: qwen2.5-3b
  12: qwen2.5-7b
  16: gemma-3-12b
