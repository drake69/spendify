# ── Spendify — Docker Compose ────────────────────────────────────────────────
# Avvio:   docker compose up -d
# Stop:    docker compose down
# Logs:    docker compose logs -f spendify
# Backup:  vedi docs/deployment.md

services:

  spendify:
    build:
      context: .
      dockerfile: Dockerfile
    image: spendify:latest
    container_name: spendify_app
    restart: unless-stopped

    ports:
      - "8501:8501"           # cambia il primo numero per usare una porta diversa sull'host

    env_file:
      - .env                   # copia .env.example → .env e compila i valori

    environment:
      # Override del percorso DB → usa il volume /app/data per la persistenza
      SPENDIFY_DB: "sqlite:////app/data/ledger.db"
      TAXONOMY_PATH: "/app/taxonomy.yaml"

    volumes:
      # Persistenza DB SQLite
      - spendify_data:/app/data
      # Log applicazione
      - spendify_logs:/app/logs
      # taxonomy.yaml montato read-only dall'host (per aggiornamenti senza rebuild)
      - ./taxonomy.yaml:/app/taxonomy.yaml:ro

    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  spendify_data:
    driver: local
  spendify_logs:
    driver: local
