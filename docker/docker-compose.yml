# ── Spendify — Docker Compose (sviluppo — build da sorgente) ─────────────────
# Avvio:   docker compose -f docker/docker-compose.yml up -d
# Stop:    docker compose -f docker/docker-compose.yml down
# Logs:    docker compose -f docker/docker-compose.yml logs -f spendify
# Backup:  vedi docs/deployment.md

name: spendify

services:

  spendify:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    image: spendify:latest
    container_name: spendify_app
    restart: unless-stopped

    ports:
      - "8501:8501"           # cambia il primo numero per usare una porta diversa sull'host

    env_file:
      - ../.env                # copia .env.example → .env e compila i valori

    environment:
      # Override del percorso DB → usa il volume /app/data per la persistenza
      SPENDIFY_DB: "sqlite:////app/data/ledger.db"
      TAXONOMY_PATH: "/app/taxonomy.yaml"

    volumes:
      # Persistenza DB SQLite
      - spendify_data:/app/data
      # Log applicazione
      - spendify_logs:/app/logs
      # taxonomy.yaml montato read-only dall'host (per aggiornamenti senza rebuild)
      - ../taxonomy.yaml:/app/taxonomy.yaml:ro

    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ── LLM locale — Ollama (Linux/server con GPU NVIDIA) ────────────────────────
  # Avvio con Ollama: docker compose --profile ollama up -d
  # Poi scarica il modello (una tantum): docker compose exec ollama ollama pull gemma3:12b
  ollama:
    image: ollama/ollama:latest
    container_name: spendify_ollama
    restart: unless-stopped
    profiles: ["ollama"]
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama   # modelli persistiti nel volume
    # GPU NVIDIA: decommenta le righe seguenti (richiede nvidia-container-toolkit)
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]

  # ── LLM locale — llama.cpp server (Windows/Mac CPU, compatibile OpenAI) ──────
  # 1. Scarica il modello GGUF e mettilo nella cartella ./models/
  #    es. https://huggingface.co/bartowski/gemma-3-4b-it-GGUF (raccomandato per CPU)
  # 2. Imposta LLAMA_MODEL nel .env con il nome del file GGUF
  # 3. Avvio: docker compose --profile llama-cpp up -d
  llama-cpp:
    image: ghcr.io/ggerganov/llama.cpp:server
    container_name: spendify_llama
    restart: unless-stopped
    profiles: ["llama-cpp"]
    ports:
      - "8080:8080"
    volumes:
      - ../models:/models             # cartella locale ./models/ → /models nel container
    command: >
      -m /models/${LLAMA_MODEL:-gemma-3-4b-it-Q4_K_M.gguf}
      --port 8080
      --host 0.0.0.0
      --ctx-size 4096
      --threads 4

volumes:
  spendify_data:
    driver: local
  spendify_logs:
    driver: local
  ollama_models:
    driver: local
