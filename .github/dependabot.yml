version: 2
updates:
  # Python dependencies (uv/pip)
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["tech-debt", "SW"]
    commit-message:
      prefix: "deps"
    open-pull-requests-limit: 5

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    labels: ["tech-debt", "SW"]
    commit-message:
      prefix: "ci"
    open-pull-requests-limit: 5

  # Docker
  - package-ecosystem: "docker"
    directory: "/docker"
    schedule:
      interval: "weekly"
    labels: ["tech-debt", "SW"]
    commit-message:
      prefix: "docker"
    open-pull-requests-limit: 3
