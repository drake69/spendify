name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }} / Python ${{ matrix.python-version }})
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.13"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests with coverage
        run: uv run pytest tests/ -v --cov=. --cov-report=term-missing --cov-report=xml
        env:
          # Prevent any accidental network calls to real LLM backends
          OLLAMA_BASE_URL: "http://localhost:99999"
          OPENAI_API_KEY: "test-key-ci"
          ANTHROPIC_API_KEY: "test-key-ci"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-${{ matrix.os }}-py${{ matrix.python-version }}
          path: coverage.xml
          retention-days: 7

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  docker:
    name: Docker build & smoke test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create minimal .env for CI
        run: cp .env.example .env

      - name: Build Docker image
        run: docker compose -f docker/docker-compose.yml build --no-cache

      - name: Start container
        run: docker compose -f docker/docker-compose.yml up -d

      - name: Wait for healthcheck to pass (max 60s)
        run: |
          echo "Waiting for Streamlit to be ready..."
          for i in $(seq 1 30); do
            if curl -sf http://localhost:8501/_stcore/health > /dev/null 2>&1; then
              echo "✅ App is up after ${i}s"
              exit 0
            fi
            sleep 2
          done
          echo "❌ App did not become healthy in time"
          docker compose -f docker/docker-compose.yml logs
          exit 1

      - name: Smoke test — verify health endpoint
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8501/_stcore/health)
          echo "Health endpoint status: $STATUS"
          [ "$STATUS" = "200" ] || (docker compose -f docker/docker-compose.yml logs && exit 1)

      - name: Teardown
        if: always()
        run: docker compose -f docker/docker-compose.yml down -v

  installer-validate:
    name: Installer validation (syntax + compose)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate install.sh syntax
        run: bash -n installer/install.sh && echo "✅ install.sh syntax OK"

      - name: Validate uninstall.sh syntax
        run: bash -n installer/uninstall.sh && echo "✅ uninstall.sh syntax OK"

      - name: Validate docker-compose.release.yml
        run: |
          # docker compose config validates YAML syntax, anchors and service references
          docker compose -f docker/docker-compose.release.yml config --quiet
          echo "✅ docker-compose.release.yml is valid"

      - name: Validate install.ps1 syntax (PowerShell)
        run: |
          # pwsh is available on ubuntu-latest GitHub runners
          pwsh -NoProfile -Command "
            \$err = \$null
            \$null = [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path installer/install.ps1),
              [ref]\$null,
              [ref]\$err
            )
            if (\$err.Count -gt 0) {
              \$err | ForEach-Object { Write-Error \$_.Message }
              exit 1
            }
            Write-Host '✅ install.ps1 syntax OK'
          "

      - name: Validate uninstall.ps1 syntax (PowerShell)
        run: |
          pwsh -NoProfile -Command "
            \$err = \$null
            \$null = [System.Management.Automation.Language.Parser]::ParseFile(
              (Resolve-Path installer/uninstall.ps1),
              [ref]\$null,
              [ref]\$err
            )
            if (\$err.Count -gt 0) {
              \$err | ForEach-Object { Write-Error \$_.Message }
              exit 1
            }
            Write-Host '✅ uninstall.ps1 syntax OK'
          "
