name: Build Linux packages (.deb + .rpm)

# Triggered on version tags or manually. Builds both .deb and .rpm,
# runs install smoke tests inside containers, then uploads artifacts
# to the GitHub Release.

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version override (e.g. 1.2.3). If empty, reads from VERSION file.'
        required: false
        default: ''

jobs:
  # ─────────────────────────────────────────────────────────────────────────
  build-deb:
    name: Build .deb (Ubuntu)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ -f VERSION ]; then
            echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Install fakeroot
        run: sudo apt-get update -qq && sudo apt-get install -y -qq fakeroot

      - name: Build .deb package
        run: bash packaging/linux/build-deb.sh --version ${{ steps.version.outputs.version }}

      - name: Verify .deb exists
        run: ls -lh build/spendifai_*.deb

      - name: Smoke test — install .deb in clean container
        run: |
          docker run --rm \
            -v "$PWD/build:/packages:ro" \
            ubuntu:24.04 \
            bash -c '
              set -e
              apt-get update -qq
              apt-get install -y -qq /packages/spendifai_*.deb 2>&1 | tail -5
              # Verify the package is installed
              dpkg -l spendifai | grep -q "^ii"
              echo "✅ .deb installed successfully"
              # Verify app.py is in place
              test -f /opt/spendifai/app.py
              echo "✅ app.py found at /opt/spendifai/"
              # Verify desktop file
              test -f /usr/share/applications/spendifai.desktop
              echo "✅ .desktop file installed"
              # Verify clean removal
              apt-get remove -y spendifai
              echo "✅ .deb removed cleanly"
            '

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: deb-package
          path: build/spendifai_*.deb
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  build-rpm:
    name: Build .rpm (Fedora)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Determine version
        id: version
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          elif [ -f VERSION ]; then
            echo "version=$(cat VERSION | tr -d '[:space:]')" >> "$GITHUB_OUTPUT"
          else
            echo "version=0.0.0" >> "$GITHUB_OUTPUT"
          fi

      - name: Install rpm-build
        run: sudo apt-get update -qq && sudo apt-get install -y -qq rpm

      - name: Build .rpm package
        run: bash packaging/linux/build-rpm.sh --version ${{ steps.version.outputs.version }}

      - name: Verify .rpm exists
        run: ls -lh build/spendifai-*.rpm

      - name: Smoke test — install .rpm in clean container
        run: |
          docker run --rm \
            -v "$PWD/build:/packages:ro" \
            fedora:41 \
            bash -c '
              set -e
              dnf install -y -q /packages/spendifai-*.rpm 2>&1 | tail -5
              # Verify the package is installed
              rpm -q spendifai
              echo "✅ .rpm installed successfully"
              # Verify app.py is in place
              test -f /opt/spendifai/app.py
              echo "✅ app.py found at /opt/spendifai/"
              # Verify desktop file
              test -f /usr/share/applications/spendifai.desktop
              echo "✅ .desktop file installed"
              # Verify clean removal
              dnf remove -y spendifai
              echo "✅ .rpm removed cleanly"
            '

      - name: Upload .rpm artifact
        uses: actions/upload-artifact@v4
        with:
          name: rpm-package
          path: build/spendifai-*.rpm
          retention-days: 30

  # ─────────────────────────────────────────────────────────────────────────
  attach-to-release:
    name: Attach packages to GitHub Release
    needs: [build-deb, build-rpm]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: deb-package
          path: packages/

      - name: Download .rpm artifact
        uses: actions/download-artifact@v4
        with:
          name: rpm-package
          path: packages/

      - name: List packages
        run: ls -lh packages/

      - name: Upload to GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          echo "Attaching packages to release $TAG"
          gh release upload "$TAG" packages/* --repo "$GITHUB_REPOSITORY" --clobber
