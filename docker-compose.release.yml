# ── Spendify — Avvio rapido (immagine pre-compilata) ─────────────────────────
#
# Non serve git clone né build locale.
# Usa l'immagine pubblicata automaticamente su GitHub Container Registry.
#
# PRIMA VOLTA:
#   1. Copia questo file in una cartella vuota (es. ~/spendify/)
#   2. Avvia:  docker compose -f docker-compose.release.yml up -d
#   3. Apri:   http://localhost:8501
#
# AGGIORNAMENTO:
#   docker compose -f docker-compose.release.yml pull
#   docker compose -f docker-compose.release.yml up -d
#
# STOP:
#   docker compose -f docker-compose.release.yml down
# ─────────────────────────────────────────────────────────────────────────────

name: spendify

services:
  spendify:
    image: ghcr.io/drake69/spendify:latest
    container_name: spendify_app
    restart: unless-stopped

    ports:
      - "8501:8501"

    environment:
      SPENDIFY_DB: "sqlite:////app/data/ledger.db"
      TAXONOMY_PATH: "/app/taxonomy.yaml"

    volumes:
      - spendify_data:/app/data
      - spendify_logs:/app/logs

    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8501/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  spendify_data:
    driver: local
  spendify_logs:
    driver: local
